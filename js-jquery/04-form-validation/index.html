<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
      /* Basic page styling */
      body {
        font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;
        background: #f5f7fb;
        color: #222;
        margin: 0;
        padding: 20px;
      }

      /* Centered container for the form */
      .container {
        max-width: 640px;
        margin: 48px auto;
        padding: 20px;
        background: #fff;
        border-radius: 10px;
        box-shadow: 0 6px 18px rgba(32,33,36,0.08);
      }

      h1 { margin: 0 0 12px 0; font-size: 20px; }
      p { margin: 0 0 16px 0; color: #555; }

      /* Search form styling */
      .search-box {
        display: flex;
        gap: 8px;
        align-items: center;
      }

      .search-box input[type="search"] {
        flex: 1 1 auto;
        padding: 10px 12px;
        font-size: 16px;
        border: 1px solid #d0d7de;
        border-radius: 8px;
        outline: none;
      }

      .search-box input[type="search"]:focus {
        border-color: #4d90fe;
        box-shadow: 0 0 0 3px rgba(77,144,254,0.08);
      }

      .search-box button {
        padding: 10px 14px;
        background: #1a73e8;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 15px;
        cursor: pointer;
      }

      .search-box button:hover { background: #1667c2; }

      /* Accessibility helper to visually hide labels but keep them available to screen readers */
      .visually-hidden {
        position: absolute !important;
        height: 1px; width: 1px;
        overflow: hidden;
        clip: rect(1px, 1px, 1px, 1px);
        white-space: nowrap;
      }

      /* Validation styles */
      .invalid {
        border-color: #e55353 !important;
        box-shadow: 0 0 0 3px rgba(229,83,83,0.08);
      }

      #error {
        color: #b00020;
        margin-top: 8px;
        font-size: 14px;
        display: none;
      }
    </style>
</head>
<body>
  <div class="container">
    <h1>Google Search Form</h1>
    <p>Type a query and submit — the form sends a GET request to Google Search.</p>

    <form class="search-box" action="https://www.google.com/search" method="get" role="search">
      <label for="q" class="visually-hidden">Search Google</label>
      <input type="search" id="q" name="q" placeholder="Search Google..." autocomplete="off">
      <button type="submit">Search</button>
    </form>

    <!-- Error message area updated by JavaScript when validation fails -->
    <div id="error" role="alert" aria-live="polite"></div>
  </div>

  <!-- Dynamically bound validation behavior -->
  <script src="formscript.js"></script>
</body>
</html>
