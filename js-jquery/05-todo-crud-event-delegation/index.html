<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ToDo Crud</title>
  <style>
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Arial;
      background: #f4f6f8;
      margin: 0;
      padding: 20px;
      color: #222;
    }

    .container {
      max-width: 780px;
      margin: 36px auto;
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 6px 18px rgba(32, 33, 36, 0.06);
    }

    h1 {
      margin: 0 0 12px 0;
      font-size: 22px;
    }

    form.add-todo {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      align-items: center;
    }

    form.add-todo input[type="text"] {
      flex: 1 1 auto;
      padding: 10px 12px;
      border: 1px solid #d0d7de;
      border-radius: 8px;
      font-size: 15px;
    }

    form.add-todo button {
      padding: 10px 14px;
      background: #16a34a;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th,
    td {
      text-align: left;
      padding: 10px 12px;
      border-bottom: 1px solid #eef2f7;
    }

    th {
      background: #fafbfc;
      font-weight: 600;
    }

    .btn-delete {
      padding: 6px 10px;
      background: #ef4444;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .btn-delete:hover {
      background: #dc2626;
    }

    .empty {
      color: #666;
      padding: 12px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Simple ToDo CRUD (no edit)</h1>
    <p>Add todos using the form below. Click Delete to remove a todo. Event Delegation is used to remove the todos.</p>

    <form class="add-todo" id="todoForm">
      <label for="todoText" class="visually-hidden">New todo</label>
      <input type="text" id="todoText" name="todoText" placeholder="Enter a new todo" autocomplete="off" required>
      <button type="submit">Add</button>
    </form>

    <table aria-describedby="todo-description">
      <thead>
        <tr>
          <th style="width:80px">ID</th>
          <th>Todo</th>
          <th style="width:140px">Actions</th>
        </tr>
      </thead>
      <tbody id="todoBody">
        <!-- Initial todos stored in HTML (no JS array). Each row has a data-id attribute. -->
        <tr data-id="1">
          <td>1</td>
          <td>Buy milk</td>
          <td><button class="btn-delete">Delete</button></td>
        </tr>
        <tr data-id="2">
          <td>2</td>
          <td>Walk the dog</td>
          <td><button class="btn-delete">Delete</button></td>
        </tr>
        <tr data-id="3">
          <td>3</td>
          <td>Learn JavaScript</td>
          <td><button class="btn-delete">Delete</button></td>
        </tr>
      </tbody>
    </table>
  </div>

  <script src="todoscript.js"></script>
</body>

</html>
